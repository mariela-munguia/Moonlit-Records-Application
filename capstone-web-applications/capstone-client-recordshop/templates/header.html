{{#loggedin}}
<div class="nav-inner">
    <a class="brand" href="#" onclick="loadHome();return false;">
        <img src="/images/moonlit-records-logo.png" alt="Moonlit Records logo">
    </a>

    <nav class="nav-links">
        <a href="#listen">Listen</a>
        <a href="#browse">Browse</a>
        <a href="#" onclick="editProfile();return false;">Profile</a>
        <span>Open til 9 PM</span>
    </nav>

    <div class="nav-actions">
        <span class="welcome-chip">{{username}}</span>
        <a href="#" onclick="userService.logout();return false;">Logout</a>
        <button class="cart" onclick="showCart()" aria-label="Open cart">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-items">0</span>
        </button>
    </div>
</div>
{{/loggedin}}
{{#loggedout}}
<div class="nav-inner">
    <a class="brand" href="#" onclick="loadHome();return false;">
        <img src="/images/moonlit-records-logo.png" alt="Moonlit Records logo">
    </a>

    <nav class="nav-links">
        <a href="#listen">Listen</a>
        <a href="#browse">Browse</a>
        <span>Open til 9 PM</span>
    </nav>

    <div class="nav-actions">
        <a href="#" onclick="showLoginForm();return false;">Login</a>
        <button class="cart" onclick="showLoginForm();return false;" aria-label="Login to open cart">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="cart-items">0</span>
        </button>
    </div>
</div>
{{/loggedout}}
