<section id="listen" class="listen-section">
    <div class="album-stage">
        <img id="hero-cover" src="/images/products/abbey-road-vinyl.jpg" alt="Selected album cover">
        <div id="hero-disc" class="disc-peek"></div>
    </div>

    <div class="listen-details">
        <div class="kicker"><i class="fa-solid fa-radio"></i> Listening station 03 · Preview mode</div>
        <button class="hero-heart" onclick="toggleHeroFavorite(this)" aria-label="Favorite selected album"><i class="fa-regular fa-heart"></i></button>
        <h1 id="hero-title">Abbey Road</h1>
        <p id="hero-artist" class="hero-artist">The Beatles · Rock</p>
        <p id="hero-sample" class="hero-sample">Sampling: choose an album below to preview one track before checkout.</p>

        <div class="seek-bar" onclick="seekPreview(event)">
            <div id="preview-progress" class="seek-fill"></div>
        </div>
        <div class="time-row"><span id="preview-current">0:00</span><span id="preview-duration">3:28</span></div>

        <div class="player-row">
            <button class="player-icon" onclick="productService.previousPreview()" aria-label="Previous album"><i class="fa-solid fa-backward-step"></i></button>
            <button id="play-button" class="play-button" onclick="togglePreview()" aria-label="Play preview"><i class="fa-solid fa-play"></i></button>
            <button class="player-icon" onclick="productService.nextPreview()" aria-label="Next album"><i class="fa-solid fa-forward-step"></i></button>

            <div class="volume-cluster">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" min="0" max="100" value="75" aria-label="Preview volume">
            </div>

            <button class="hero-cart-button" onclick="productService.addPreviewToCart()">+ Add to bag · <span id="hero-price">$0</span></button>
        </div>

        <p class="fine-print">Audio previews are simulated for demo. Checkout uses your real Spring Boot API.</p>
    </div>
</section>

<section id="browse" class="browse-section">
    <div class="browse-tools">
        <div class="search-shell">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="record-search" type="text" placeholder="Search artists, albums..." oninput="productService.setSearchQuery(this.value)">
            <button onclick="clearRecordSearch()" aria-label="Clear search"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="genre-pills">
            <button class="genre-pill active" data-genre="" onclick="selectGenrePill(this)">All</button>
            <button class="genre-pill" data-genre="Rock" onclick="selectGenrePill(this)">Rock</button>
            <button class="genre-pill" data-genre="Pop" onclick="selectGenrePill(this)">Pop</button>
            <button class="genre-pill" data-genre="Jazz" onclick="selectGenrePill(this)">Jazz</button>
            <button class="genre-pill" data-genre="Hip-Hop" onclick="selectGenrePill(this)">Hip-Hop</button>
            <button class="genre-pill" data-genre="Alternative" onclick="selectGenrePill(this)">Alternative</button>
            <button class="genre-pill" data-genre="Electronic" onclick="selectGenrePill(this)">Electronic</button>
        </div>
    </div>

    <details class="advanced-filters">
        <summary>More filters</summary>
        <div class="filter-grid">
            <div class="form-floating">
                <select id="category-select" class="form-select" onchange="setCategory(this)">
                    <option value="0">Show All</option>
                </select>
                <label for="category-select">Category</label>
            </div>

            <div class="range-group">
                <label for="min-price" class="form-label">Min $<span id="min-price-display">0</span></label>
                <input type="range" class="form-range" id="min-price" min="0" max="500" value="0" onchange="setMinPrice(this)">
            </div>

            <div class="range-group">
                <label for="max-price" class="form-label">Max $<span id="max-price-display">500</span></label>
                <input type="range" class="form-range" id="max-price" min="0" max="500" value="500" onchange="setMaxPrice(this)">
            </div>

            <div class="form-floating">
                <select id="subcategory-select" class="form-select" onchange="setSubcategory(this)">
                    <option value="">Show All</option>
                    <option>Rock</option>
                    <option>Pop</option>
                    <option>Jazz</option>
                    <option>Hip-Hop</option>
                    <option>Folk</option>
                    <option>Reggae</option>
                    <option>R&B</option>
                    <option>Country</option>
                    <option>Alternative</option>
                    <option>Electronic</option>
                </select>
                <label for="subcategory-select">Genre</label>
            </div>

            <button class="clear-filter-button" onclick="clearAllFilters()">Clear filters</button>
        </div>
    </details>

    <div class="crate-meta"><span id="record-count">0</span> records in crate</div>
    <div id="content" class="content"></div>
</section>
